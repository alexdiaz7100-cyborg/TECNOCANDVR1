<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TECNOCAND - Carrito</title>
    <link rel="stylesheet" type="text/css" href="css/estilos.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.9.1/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
<div class="wrapper">
    <aside>
        <header>
            <h1 class="logo">TECNOCAND</h1>
        </header>
        <nav>
            <ul>
                <li><a class="boton-menu boton-volver" href="./Index.html"><i class="bi bi-arrow-return-left"></i> Seguir Comprando</a></li>
                <li><a class="boton-menu boton-carrito active" href="./carrito.html"><i class="bi bi-cart-plus-fill"></i> Carrito</a></li>
            </ul>
        </nav>
        <footer><p class="text-footer">© 2026 TECNOCAND</p></footer>
    </aside>

    <main>
        <h2 class="titulo-principal">Carrito</h2>
        <div class="contenedor-carrito">
            <p id="carrito-vacio" class="carrito-vacio">Tu carrito está vacío <i class="bi bi-emoji-dizzy"></i></p>
            
            <div id="carrito-productos" class="carrito-productos disabled"></div>

            <div id="carrito-acciones" class="carrito-acciones disabled">
                <div class="carrito-acciones-izquierda">
                    <button id="carrito-acciones-vaciar" class="carrito-acciones-vaciar">Vaciar carrito</button>
                </div>
                <div class="carrito-acciones-derecha">
                    <div class="carrito-acciones-total">
                        <p>Total:</p>
                        <p id="total">C$0</p>
                    </div>
                    <button id="carrito-acciones-comprar" class="carrito-acciones-comprar">Comprar ahora</button>
                </div>
            </div>

            <p id="carrito-comprado" class="carrito-comprado disabled">
                Muchas Gracias por su compra! <i class="bi bi-emoji-smile"></i>
            </p>
        </div>
    </main>
</div>

<script type="module" src="./js/carrito.js"></script>
</body>
</html>
