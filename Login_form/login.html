<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login o registro</title>
    <link rel="stylesheet" href="stylelogin.css">
    <link href="https://cdn.jsdelivr.net/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.9.1/font/bootstrap-icons.css">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
</head>
<body>
   <div class="container">
   <h1>Iniciar sesión</h1>
   <form>
    <div class="input-box">
        <input type="text" placeholder= "Nombre de usuario" required>
        <i class="bx bxs-user"></i>
    </div>
    <div class="input-box">
        <input type="password" placeholder= "Contraseña" required>
        <i class="bx bxs-lock-alt"></i>
    </div>
    <div class="remember-password">
        <label><input type="checkbox"> Recordarme</label>
        <a href="#">¿Olvidaste tu Contraseña?</a>
    </div>

    <button type="submit"class="btn">INGRESAR</button>

    <p class="register-link"> Si no tiene cuenta de usuario  
        <a href="#">Registrarse</a></p>
    
    <a class="btn-volver" href="/Index.html"></button>
        <i class="bi bi-arrow-return-left"></i></i>Ir a Inicio
   </form> 
   
   
</body>


</html>
